name: Local First Gate

on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  local-first-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dependencies
        run: npm ci --workspaces --include-workspace-root --include=dev

      - name: API test dependency preflight
        run: npm run preflight:test-deps --workspace=@dx-aiot/api

      - name: Run static local-first gate
        run: npm run qa:local-first-gate

      - name: Start local Docker stack
        run: docker compose up -d

      - name: Verify API health on local stack
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/api/health >/dev/null; then
              echo "API health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "API health check failed after waiting"
          docker compose logs --no-color api postgres redis
          exit 1

      - name: Teardown local Docker stack
        if: always()
        run: docker compose down -v
