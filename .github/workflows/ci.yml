name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test

jobs:
  # ──────────────────────────────────────────
  # Job 1: Type check (api + web)
  # ──────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Typecheck API
        run: npm run --workspace=@dx-aiot/api typecheck

      - name: Typecheck Web
        run: npm run --workspace=@dx-aiot/web typecheck

  # ──────────────────────────────────────────
  # Job 2: Tests with coverage (api only — no real API keys)
  # ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OPENAI_LOCAL_MODE: 'true'
      MOMO_LOCAL_MODE: 'true'
      JWT_SECRET: ci-test-secret-not-for-production
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run API tests with coverage
        run: npm run --workspace=@dx-aiot/api test:cov

  # ──────────────────────────────────────────
  # Job 3: Build (api + web)
  # ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run --workspace=@dx-aiot/api build

      - name: Build Web
        run: npm run --workspace=@dx-aiot/web build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  # ──────────────────────────────────────────
  # Job 4: Lint across monorepo (via Turbo)
  # ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
