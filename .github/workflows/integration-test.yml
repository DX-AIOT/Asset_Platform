name: Integration Test — Docker Compose

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Docker Compose — Full Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build --no-cache

      - name: Start all services
        run: docker compose up -d

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U asset_user -d asset_platform 2>/dev/null; then
              echo "PostgreSQL ready"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL failed to start"
          docker compose logs postgres
          exit 1

      - name: Wait for Redis
        run: |
          for i in $(seq 1 15); do
            if docker compose exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "Redis ready"
              exit 0
            fi
            sleep 2
          done
          echo "Redis failed to start"
          docker compose logs redis
          exit 1

      - name: Wait for API startup
        run: |
          for i in $(seq 1 60); do
            if docker compose logs api 2>&1 | grep -q "Nest application successfully started"; then
              echo "API started"
              exit 0
            fi
            if docker compose logs api 2>&1 | grep -q "MODULE_NOT_FOUND"; then
              echo "FATAL: Module not found at runtime"
              docker compose logs api
              exit 1
            fi
            sleep 3
          done
          echo "API failed to start"
          docker compose logs api
          exit 1

      - name: Health check
        run: curl -sf http://localhost:3001/api/health

      - name: Login flow
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"demo@dx-aiot.com","password":"Demo@123"}')
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'accessToken' in d, 'Missing accessToken'
          assert 'user' in d, 'Missing user'
          print('Login OK:', d['user'].get('email'))
          "

      - name: Items API
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:3001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"demo@dx-aiot.com","password":"Demo@123"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['accessToken'])")
          curl -sf http://localhost:3001/api/items/my \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'items' in d and isinstance(d['items'], list), 'Bad items response'
          print(f'Items OK: {len(d[\"items\"])} items')
          "

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps
          echo "=== API ===" && docker compose logs api --tail 50
          echo "=== POSTGRES ===" && docker compose logs postgres --tail 20

      - name: Notify Paperclip on failure
        if: failure()
        env:
          PAPERCLIP_API_URL: https://paperclip.aiotso.net
          PAPERCLIP_TOKEN: ${{ secrets.PAPERCLIP_BOARD_TOKEN }}
          COMPANY_ID: ec272d4a-6b74-4fb9-8300-4563cfcf9340
          PROJECT_ID: c008a6be-10d0-4f84-a641-c17fa79bfdcc
          QADEVOPS_ID: 6202c369-97b1-4849-8751-b8f77f71b9bd
        run: |
          curl -s -X POST "$PAPERCLIP_API_URL/api/companies/$COMPANY_ID/issues" \
            -H "Authorization: Bearer $PAPERCLIP_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"CI FAIL: Integration test failed on dev (commit ${GITHUB_SHA::8})\",
              \"description\": \"## CI Integration Test Failed\\n\\n**Branch:** $GITHUB_REF_NAME\\n**Commit:** $GITHUB_SHA\\n**Run:** https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\\n\\nDocker Compose full-stack test failed. Check the run logs for details. Fix and push to dev again.\",
              \"priority\": \"critical\",
              \"status\": \"todo\",
              \"assigneeAgentId\": \"$QADEVOPS_ID\",
              \"projectId\": \"$PROJECT_ID\"
            }"

      - name: Cleanup
        if: always()
        run: docker compose down -v
